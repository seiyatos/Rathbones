# Investor ML API + Prometheus + Grafana
# Usage: docker compose up -d
#   API:     http://localhost:8000
#   Prometheus: http://localhost:9090
#   Grafana:  http://localhost:3000 (default login admin / admin; set new password on first run)
#
# Ensure config/ and artifacts/ (with a trained model) exist, or the API will not be ready.

services:
  investor-ml:
    build: .
    image: investor-ml:latest
    container_name: investor-ml
    ports:
      - "8000:8000"
    environment:
      - INVESTOR_ML_CONFIG_PATH=/app/config/config.yaml
      - INVESTOR_ML_SERVE_PREDICT_ONLY=1
    volumes:
      - ./config:/app/config
      - ./artifacts:/app/artifacts
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/health')"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 10s

  prometheus:
    image: prom/prometheus:v2.52.0
    container_name: prometheus
    ports:
      - "9090:9090"
    volumes:
      - ./prometheus.yml:/etc/prometheus/prometheus.yml:ro
    command:
      - --config.file=/etc/prometheus/prometheus.yml
      - --storage.tsdb.path=/prometheus
      - --web.enable-lifecycle
    restart: unless-stopped
    depends_on:
      investor-ml:
        condition: service_started

  grafana:
    image: grafana/grafana:11.2.0
    container_name: grafana
    ports:
      - "3000:3000"
    environment:
      - GF_SECURITY_ADMIN_USER=admin
      - GF_SECURITY_ADMIN_PASSWORD=admin
      - GF_USERS_ALLOW_SIGN_UP=false
      - GF_SERVER_HTTP_PORT=3000
    volumes:
      - grafana_data:/var/lib/grafana
      - ./grafana/provisioning:/etc/grafana/provisioning:ro
    restart: unless-stopped
    depends_on:
      - prometheus

volumes:
  grafana_data:
