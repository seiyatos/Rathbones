name: Continuous Integration

# Required GitHub Actions secrets (Settings → Secrets and variables → Actions):
#
# Docker Hub (optional – push to seiyato/investor-ml:latest):
#   DOCKERHUB_USERNAME
#   DOCKERHUB_TOKEN
#
# AWS ECR (optional – push to <account>.dkr.ecr.<region>.amazonaws.com/investor-ml:latest):
#   AWS_ACCESS_KEY_ID      – IAM user/role with ecr:GetAuthorizationToken and ecr:PutImage, etc.
#   AWS_SECRET_ACCESS_KEY
#   AWS_REGION             – e.g. us-east-1 (optional; defaults to us-east-1 in workflow)
#
# Create ECR repo first: aws ecr create-repository --repository-name investor-ml --region <region>

on:
  push:
    branches: [main]  # Only trigger on main branch pushes

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Cache .venv
        id: cache-venv
        uses: actions/cache@v4
        with:
          path: .venv
          key: venv-${{ runner.os }}-py3.12-${{ hashFiles('pyproject.toml') }}
          restore-keys: |
            venv-${{ runner.os }}-py3.12-

      - name: Install dependencies
        if: steps.cache-venv.outputs.cache-hit != 'true'
        run: |
          python -m venv .venv
          . .venv/bin/activate
          pip install --upgrade pip
          pip install -e .

      - name: Lint
        run: |
          . .venv/bin/activate
          ruff check src tests

      - name: Run tests
        run: |
          . .venv/bin/activate
          pytest tests -v --tb=short

  compose-smoke:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Verify Docker Compose
        run: docker compose version

      - name: Ensure config and artifacts dirs exist (config is in repo; artifacts may be empty)
        run: |
          mkdir -p config artifacts
          test -f config/config.yaml

      - name: Start stack with Docker Compose
        run: docker compose up -d

      - name: Wait for API and check /health
        run: |
          timeout 60 bash -c 'until curl -sf http://localhost:8000/health; do sleep 2; done'
          curl -s http://localhost:8000/health | grep -q ok

      - name: Check Prometheus and Grafana are up
        run: |
          curl -sf http://localhost:9090/-/healthy
          timeout 45 bash -c 'until [ "$(curl -s -o /dev/null -w "%{http_code}" http://localhost:3000/api/health)" = "200" ]; do sleep 3; done'

      - name: Tear down
        if: always()
        run: docker compose down -v

  build-and-push:
    runs-on: ubuntu-latest
    needs: [test]

    steps:
      - name: Checkout code repository
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ secrets.AWS_REGION || 'us-east-1' }}

      - name: Log in to AWS ECR
        id: ecr-login
        uses: aws-actions/amazon-ecr-login@v2

      - name: Build Docker image
        id: build
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./Dockerfile
          push: false
          load: true
          tags: investor-ml:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Push to Docker Hub
        run: |
          docker tag investor-ml:latest seiyato/investor-ml:latest
          docker push seiyato/investor-ml:latest

      - name: Push to AWS ECR
        run: |
          docker tag investor-ml:latest ${{ steps.ecr-login.outputs.registry }}/rathbones
          docker push ${{ steps.ecr-login.outputs.registry }}/rathbones