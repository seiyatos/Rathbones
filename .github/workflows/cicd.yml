build-and-push-ecr-image:
  name: Continuous Delivery
  needs: integration
  runs-on: ubuntu-latest
  outputs:
    image_uri: ${{ steps.build-image.outputs.image }}

  steps:
    - name: Checkout Code
      uses: actions/checkout@v4

    - name: Configure AWS credentials
      uses: aws-actions/configure-aws-credentials@v4
      with:
        aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
        aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
        aws-region: ${{ secrets.AWS_REGION }}

    - name: Login to Amazon ECR
      id: login-ecr
      uses: aws-actions/amazon-ecr-login@v2

    - name: Build, tag, and push image to Amazon ECR
      id: build-image
      env:
        ECR_REGISTRY: ${{ steps.login-ecr.outputs.registry }}
        ECR_REPOSITORY: ${{ secrets.ECR_REPOSITORY_NAME }}
        IMAGE_TAG: ${{ github.sha }}
      run: |
        IMAGE_URI="$ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG"
        LATEST_URI="$ECR_REGISTRY/$ECR_REPOSITORY:latest"

        docker build -t "$IMAGE_URI" -f ./Dockerfile .
        docker push "$IMAGE_URI"

        docker tag "$IMAGE_URI" "$LATEST_URI"
        docker push "$LATEST_URI"

        echo "image=$IMAGE_URI" >> "$GITHUB_OUTPUT"

continuous-deployment:
  name: Deploy to self-hosted
  needs: build-and-push-ecr-image
  runs-on: self-hosted

  steps:
    - name: Checkout
      uses: actions/checkout@v4

    - name: Configure AWS credentials
      uses: aws-actions/configure-aws-credentials@v4
      with:
        aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
        aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
        aws-region: ${{ secrets.AWS_REGION }}

    - name: Login to Amazon ECR
      uses: aws-actions/amazon-ecr-login@v2

    - name: Debug image URI
      run: echo "IMAGE=${{ needs.build-and-push-ecr-image.outputs.image_uri }}"

    - name: Pull latest built image
      run: docker pull "${{ needs.build-and-push-ecr-image.outputs.image_uri }}"